<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Modern, type-safe toast notification builder with live preview and code export. Build custom notifications with Vue 3 and TypeScript."
    />
    <meta
      name="keywords"
      content="toast, notification, builder, vue3, typescript, preview"
    />
    <meta name="author" content="Canberk" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Toast Notification Builder" />
    <meta
      property="og:description"
      content="Build and preview custom toast notifications with live code export"
    />

    <meta
      name="theme-color"
      content="#3b82f6"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1e40af"
      media="(prefers-color-scheme: dark)"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />

    <title>Toast Notification Builder | Vue 3 + TypeScript</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

    <div
      id="toast-announcer"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      style="
        position: absolute;
        left: -10000px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      "
    ></div>
  </body>
</html>
